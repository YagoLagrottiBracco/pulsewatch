<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo encostada nas extremidades -->
  <g transform="translate(6, 6) scale(4.2)">
    <!-- Círculo principal completo -->
    <circle
      cx="60"
      cy="60"
      r="50"
      stroke="#8b5cf6"
      stroke-width="8"
      fill="none"
    />
    
    <!-- Linha de pulso/heartbeat -->
    <path
      d="M 25 55 L 35 55 L 42 35 L 50 75 L 58 45 L 65 55 L 80 55"
      stroke="#8b5cf6"
      stroke-width="7"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    
    <!-- Carrinho de compras -->
    <g>
      <path
        d="M 35 70 L 42 70 L 48 90 L 75 90 L 69 70 Z"
        stroke="#8b5cf6"
        stroke-width="6"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <circle cx="50" cy="100" r="5" fill="#8b5cf6" />
      <circle cx="70" cy="100" r="5" fill="#8b5cf6" />
    </g>
    
    <!-- Badge de alerta -->
    <g>
      <circle cx="95" cy="25" r="20" fill="#8b5cf6" />
      <circle cx="95" cy="25" r="17" fill="white" />
      <circle cx="95" cy="25" r="14" fill="#8b5cf6" />
      <line x1="95" y1="17" x2="95" y2="27" stroke="white" stroke-width="4" stroke-linecap="round" />
      <circle cx="95" cy="31" r="2" fill="white" />
    </g>
  </g>
</svg>
